<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>印 — Premier Series 26-27予想企画</title>
    <link rel="icon" href="favicon.ico">
    <link rel="apple-touch-icon" href="apple-touch-icon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        :root {
            --frame-1:#f0f0f0; --frame-1-text:#111;
            --frame-2:#111;    --frame-2-text:#fff;
            --frame-3:#cc2200; --frame-3-text:#fff;
            --frame-4:#1a4fd6; --frame-4-text:#fff;
            --frame-5:#d4a000; --frame-5-text:#111;
            --frame-6:#1a7a3a; --frame-6-text:#fff;
            --frame-7:#d06000; --frame-7-text:#fff;
            --frame-8:#c0357a; --frame-8-text:#fff;
            --col-width: 110px;
            --label-width: 68px;
        }

        .page-inner { max-width: 1100px; margin: 0 auto; padding: 0 16px 40px; }

        /* ── PC: 横スクロールテーブル ── */
        .marks-outer { overflow-x: auto; -webkit-overflow-scrolling: touch; margin: 12px 0 20px; display: flex; justify-content: flex-start; }
        .marks-table { display: flex; flex-direction: row-reverse; width: max-content; border: 2px solid #222; background: #fff; flex-shrink: 0; }
        .label-col { width: var(--label-width); display: flex; flex-direction: column; background: #f4f4f4; border-left: 2px solid #222; flex-shrink: 0; }
        .label-col .cell { font-size: .78em; font-weight: bold; color: #333; justify-content: center; text-align: center; background: #f4f4f4; }
        .team-col { width: var(--col-width); border-left: 1px solid #bbb; display: flex; flex-direction: column; }
        .team-col:last-child { border-left: none; }
        .cell { border-bottom: 1px solid #ccc; display: flex; align-items: center; justify-content: center; text-align: center; padding: 4px; font-size: .82em; min-height: 32px; box-sizing: border-box; width: 100%; }
        .row-num .cell { font-size: 1.15em; font-weight: 900; min-height: 36px; border-bottom: 2px solid #222; }
        .frame-1 .row-num .cell { background: var(--frame-1); color: var(--frame-1-text); border-bottom: 2px solid #888; }
        .frame-2 .row-num .cell { background: var(--frame-2); color: var(--frame-2-text); }
        .frame-3 .row-num .cell { background: var(--frame-3); color: var(--frame-3-text); }
        .frame-4 .row-num .cell { background: var(--frame-4); color: var(--frame-4-text); }
        .frame-5 .row-num .cell { background: var(--frame-5); color: var(--frame-5-text); }
        .frame-6 .row-num .cell { background: var(--frame-6); color: var(--frame-6-text); }
        .frame-7 .row-num .cell { background: var(--frame-7); color: var(--frame-7-text); }
        .frame-8 .row-num .cell { background: var(--frame-8); color: var(--frame-8-text); }
        .row-logo .cell { min-height: 72px; background: #fff; }
        .row-logo .cell img { width: 56px; height: 56px; object-fit: contain; }
        .logo-placeholder { width: 56px; height: 56px; background: #ddd; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: .75em; font-weight: bold; color: #555; }
        .row-name .cell { font-weight: bold; font-size: .8em; min-height: 40px; line-height: 1.4; background: #fff; white-space: normal; padding: 4px 6px; overflow-wrap: break-word; }
        .row-select .cell { min-height: 48px; background: #fafafa; padding: 4px; }
        .mark-select { width: calc(var(--col-width) - 12px); padding: 5px 2px; font-size: .85em; border: 1px solid #aaa; border-radius: 3px; background: #fff; cursor: pointer; text-align: center; font-family: 'Noto Sans JP', sans-serif; }
        .mark-select:focus { outline: 2px solid #003399; }
        .mark-select.sel-honmei { background: #fff0f0; border-color: #d00; font-weight: bold; }
        .mark-select.sel-taikou { background: #fffbe6; border-color: #d4a000; font-weight: bold; }
        .mark-select.sel-tanana { background: #f0fff0; border-color: #1a7a3a; font-weight: bold; }
        .mark-select.sel-renka  { background: #f0f0ff; border-color: #1a4fd6; font-weight: bold; }
        .mark-select.sel-osae   { background: #f5f5f5; border-color: #888; }

        /* ── アクションボタン行 ── */
        .action-bar { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
        .save-status { font-size: .82em; color: #007d43; display: none; }
        .next-btn { display: inline-block; padding: 10px 24px; background: #007d43; color: #fff; font-weight: bold; border-radius: 4px; text-decoration: none; font-size: .9em; }
        .next-btn:hover { background: #005a30; }
        .odds-btn { display: inline-block; padding: 10px 24px; background: #003399; color: #fff; font-weight: bold; border-radius: 4px; text-decoration: none; font-size: .9em; }
        .odds-btn:hover { background: #0044cc; }
        .reset-btn { padding: 8px 16px; font-size: .85em; background: none; border: 1px solid #d00; color: #d00; border-radius: 4px; cursor: pointer; font-family: 'Noto Sans JP', sans-serif; }
        .reset-btn:hover { background: #fff0f0; }

        /* ── フォーメーションパネル ── */
        .formation-panel { border: 2px solid #003399; border-radius: 8px; padding: 16px 18px; margin: 16px 0; background: #f0f4ff; }
        .formation-panel h3 { margin: 0 0 10px; font-size: .95em; color: #003399; }
        .formation-row { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; margin-bottom: 10px; }
        .formation-row label { font-size: .85em; font-weight: bold; min-width: 80px; }
        .formation-select { padding: 6px 10px; border: 1px solid #aaa; border-radius: 4px; font-size: .88em; background: #fff; font-family: 'Noto Sans JP', sans-serif; }
        .formation-go-btn { display: inline-block; padding: 10px 24px; background: #e91e63; color: #fff; font-weight: bold; border-radius: 4px; font-size: .9em; border: none; cursor: pointer; font-family: 'Noto Sans JP', sans-serif; }
        .formation-go-btn:hover { background: #c2185b; }
        .formation-preview { font-size: .82em; color: #555; margin-top: 6px; padding: 6px 10px; background: #fff; border-radius: 4px; border: 1px solid #ccd; line-height: 1.8; }

        /* ── ツイートパネル ── */
        .tweet-panel { border: 2px solid #1da1f2; border-radius: 8px; padding: 16px 18px; margin: 16px 0; background: #f0f8ff; }
        .tweet-panel h3 { margin: 0 0 10px; font-size: .95em; color: #1da1f2; }
        .image-mode-bar { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
        .image-mode-btn { padding: 7px 16px; border: 2px solid #1da1f2; background: #fff; color: #1da1f2; border-radius: 4px; cursor: pointer; font-size: .85em; font-weight: bold; font-family: 'Noto Sans JP', sans-serif; }
        .image-mode-btn.active { background: #1da1f2; color: #fff; }
        #canvas-wrap { margin: 10px 0; overflow: auto; }
        #preview-canvas { border: 1px solid #ccc; border-radius: 4px; max-width: 100%; display: block; }
        .tweet-text-area { width: 100%; box-sizing: border-box; padding: 8px; font-size: .88em; border: 1px solid #ccc; border-radius: 4px; margin-bottom: 10px; resize: vertical; font-family: 'Noto Sans JP', sans-serif; }
        .tweet-actions { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
        .btn-save-img { padding: 8px 20px; background: #007d43; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: .88em; font-family: 'Noto Sans JP', sans-serif; }
        .btn-save-img:hover { background: #005a30; }
        .btn-tweet { padding: 8px 20px; background: #1da1f2; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: .88em; font-family: 'Noto Sans JP', sans-serif; }
        .btn-tweet:hover { background: #0d8ed9; }
        .no-honmei-note { color: #d00; font-size: .85em; }

        /* ── PC非表示・SP非表示 ── */
        .sp-only { display: none; }
        .pc-only { display: block; }

        /* ══════════════════════════════
           スマホ (767px以下)
        ══════════════════════════════ */
        @media (max-width: 767px) {
            .pc-only { display: none !important; }
            .sp-only { display: block !important; }

            .page-inner { padding: 0 10px 40px; }
            .section-title { font-size: 1em; margin: 12px 0 8px; }

            /* フォーメーション・ツイートパネルはそのまま（横幅対応のみ） */
            .formation-row { flex-direction: column; align-items: flex-start; }
            .formation-select { width: 100%; }

            /* スマホ用印入力カードリスト */
            .sp-marks-list { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
            .sp-mark-card { background: #fff; border: 1px solid #dde3ed; border-radius: 10px; overflow: hidden; display: flex; align-items: center; min-height: 58px; }
            .sp-frame-badge { width: 38px; min-height: 58px; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; font-weight: 900; flex-shrink: 0; }
            .sp-frame-1 { background: var(--frame-1); color: var(--frame-1-text); }
            .sp-frame-2 { background: var(--frame-2); color: var(--frame-2-text); }
            .sp-frame-3 { background: var(--frame-3); color: var(--frame-3-text); }
            .sp-frame-4 { background: var(--frame-4); color: var(--frame-4-text); }
            .sp-frame-5 { background: var(--frame-5); color: var(--frame-5-text); }
            .sp-frame-6 { background: var(--frame-6); color: var(--frame-6-text); }
            .sp-frame-7 { background: var(--frame-7); color: var(--frame-7-text); }
            .sp-frame-8 { background: var(--frame-8); color: var(--frame-8-text); }
            .sp-mark-logo { width: 44px; min-height: 58px; display: flex; align-items: center; justify-content: center; background: #fafafa; border-left: 1px solid #eef0f4; flex-shrink: 0; }
            .sp-mark-logo img { width: 30px; height: 30px; object-fit: contain; }
            .sp-mark-logo-ph { width: 30px; height: 30px; background: #e8eaed; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: .55rem; font-weight: 700; color: #8a9ab2; }
            .sp-mark-info { flex: 1; padding: 8px 10px; min-width: 0; }
            .sp-mark-name { font-size: .84rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #0a1628; margin-bottom: 6px; }
            /* 印ボタングループ */
            .sp-mark-btns { display: flex; gap: 4px; flex-wrap: wrap; }
            .sp-mark-btn {
                min-width: 36px; height: 32px; padding: 0 6px;
                border: 1.5px solid #ccc; border-radius: 6px;
                background: #f8f8f8; color: #444;
                font-size: .82rem; font-weight: 700;
                cursor: pointer; font-family: 'Noto Sans JP', sans-serif;
                transition: background .12s, border-color .12s, color .12s;
                -webkit-tap-highlight-color: transparent;
            }
            .sp-mark-btn.active-honmei { background: #fff0f0; border-color: #cc2200; color: #cc2200; }
            .sp-mark-btn.active-taikou { background: #fffbe6; border-color: #b08000; color: #7a5800; }
            .sp-mark-btn.active-tanana { background: #f0fff0; border-color: #1a7a3a; color: #1a7a3a; }
            .sp-mark-btn.active-renka  { background: #f0f0ff; border-color: #1a4fd6; color: #1a4fd6; }
            .sp-mark-btn.active-osae   { background: #f5f5f5; border-color: #888; color: #444; }
            .sp-mark-btn.none-btn { color: #bbb; font-size: .72rem; font-weight: 400; }
            .sp-mark-btn.none-btn.active-none { background: #e0e0e0; border-color: #888; color: #333; font-weight: 700; }

            /* スマホ用アクションバー */
            .sp-action-bar { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
            .sp-action-bar a, .sp-action-bar button { display: block; width: 100%; text-align: center; padding: 12px; border-radius: 6px; font-size: .9rem; font-weight: 700; box-sizing: border-box; font-family: 'Noto Sans JP', sans-serif; }
            .sp-next-btn { background: #007d43; color: #fff; text-decoration: none; }
            .sp-odds-btn { background: #003399; color: #fff; text-decoration: none; }
            .sp-reset-btn { background: none; border: 1.5px solid #d00; color: #d00; cursor: pointer; }
        }
    </style>
</head>

<script>
document.addEventListener('DOMContentLoaded', renderCountdown);

const UNIQUE_MARKS  = ['honmei','taikou','tanana','renka'];
const MARK_OPTIONS  = [
    { value:'',       label:'なし' },
    { value:'honmei', label:'◎ 本命' },
    { value:'taikou', label:'○ 対抗' },
    { value:'tanana', label:'▲ 単穴' },
    { value:'renka',  label:'⟁ 連下' },
    { value:'osae',   label:'△ 抑え' },
];
const MARK_LABELS    = { honmei:'◎', taikou:'○', tanana:'▲', renka:'⟁', osae:'△' };
const MARK_LABELS_JP = { honmei:'◎本命', taikou:'○対抗', tanana:'▲単穴', renka:'⟁連下', osae:'△抑え' };
const MARK_ORDER     = ['honmei','taikou','tanana','renka','osae'];
const FRAME_COLORS   = {
    1:{ bg:'#f0f0f0', text:'#111' }, 2:{ bg:'#111', text:'#fff' },
    3:{ bg:'#cc2200', text:'#fff' }, 4:{ bg:'#1a4fd6', text:'#fff' },
    5:{ bg:'#d4a000', text:'#111' }, 6:{ bg:'#1a7a3a', text:'#fff' },
    7:{ bg:'#d06000', text:'#fff' }, 8:{ bg:'#c0357a', text:'#fff' },
};

let teamsData     = [];
let selectedMarks = JSON.parse(localStorage.getItem(MY_MARKS_KEY) || '{}');
let imageMode     = 'honmei';
let logoCache     = {};

window.addEventListener('DOMContentLoaded', async () => {
    try {
        teamsData = await loadJSON('data/teams.json');
        renderPCTable();
        renderSPList();
        updateFormationPreview();
        await preloadLogos();
        drawCanvas();
    } catch(e) { console.error(e); }
});

/* ── PC: テーブル描画 ── */
function renderPCTable() {
    const table = document.getElementById('marks-table');
    table.innerHTML = '';
    const labelCol = document.createElement('div'); labelCol.className = 'label-col';
    [{ cls:'row-num',text:'番号'},{ cls:'row-logo',text:''},{ cls:'row-name',text:'チーム名'},{ cls:'row-select',text:'印'}].forEach(d => {
        const w = document.createElement('div'); w.className = d.cls;
        const c = document.createElement('div'); c.className = 'cell'; c.textContent = d.text;
        w.appendChild(c); labelCol.appendChild(w);
    });
    table.appendChild(labelCol);
    teamsData.forEach(team => {
        const col = document.createElement('div'); col.className = `team-col frame-${team.id}`;
        addCell(col, 'row-num', String(team.id));
        const lw = document.createElement('div'); lw.className = 'row-logo';
        const lc = document.createElement('div'); lc.className = 'cell';
        const img = document.createElement('img'); img.src = team.logo; img.alt = team.tag;
        img.onerror = () => { const p = document.createElement('div'); p.className = 'logo-placeholder'; p.textContent = team.tag; lc.replaceChild(p, img); };
        lc.appendChild(img); lw.appendChild(lc); col.appendChild(lw);
        addCell(col, 'row-name', team.name);
        const sw = document.createElement('div'); sw.className = 'row-select';
        const sc = document.createElement('div'); sc.className = 'cell';
        const sel = document.createElement('select'); sel.className = 'mark-select'; sel.id = `mark-${team.id}`;
        MARK_OPTIONS.forEach(opt => { const o = document.createElement('option'); o.value = opt.value; o.textContent = opt.label; sel.appendChild(o); });
        const saved = selectedMarks[String(team.id)] || ''; sel.value = saved; updateSelectStyle(sel, saved);
        sel.addEventListener('change', () => onMarkChange(team.id, sel.value));
        sc.appendChild(sel); sw.appendChild(sc); col.appendChild(sw);
        table.appendChild(col);
    });
}

/* ── SP: カードリスト描画 ── */
function renderSPList() {
    const list = document.getElementById('sp-marks-list');
    list.innerHTML = '';
    teamsData.forEach(team => {
        const saved = selectedMarks[String(team.id)] || '';
        const card = document.createElement('div');
        card.className = 'sp-mark-card';
        card.innerHTML = `
            <div class="sp-frame-badge sp-frame-${team.id}">${team.id}</div>
            <div class="sp-mark-logo">
                <img src="${team.logo}" alt="${team.tag}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
                <div class="sp-mark-logo-ph" style="display:none">${team.tag}</div>
            </div>
            <div class="sp-mark-info">
                <div class="sp-mark-name">${team.name}</div>
                <div class="sp-mark-btns" id="sp-btns-${team.id}">
                    <button class="sp-mark-btn none-btn ${!saved ? 'active-none' : ''}" data-val="" data-tid="${team.id}">なし</button>
                    ${MARK_OPTIONS.filter(o=>o.value).map(o =>
                        `<button class="sp-mark-btn ${saved===o.value ? 'active-'+o.value : ''}" data-val="${o.value}" data-tid="${team.id}">${MARK_LABELS[o.value]}</button>`
                    ).join('')}
                </div>
            </div>`;
        card.querySelectorAll('.sp-mark-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const val = btn.dataset.val;
                const tid = parseInt(btn.dataset.tid);
                onMarkChange(tid, val);
                refreshSPBtns(tid);
            });
        });
        list.appendChild(card);
    });
}

function refreshSPBtns(teamId) {
    const saved = selectedMarks[String(teamId)] || '';
    const btns = document.querySelectorAll(`#sp-btns-${teamId} .sp-mark-btn`);
    btns.forEach(btn => {
        const val = btn.dataset.val;
        btn.className = 'sp-mark-btn';
        if (val === '') {
            btn.classList.add('none-btn');
            if (!saved) btn.classList.add('active-none');
        } else {
            if (saved === val) btn.classList.add('active-' + val);
        }
    });
    // 他のチームのbtnsも更新（排他制御のため）
    teamsData.forEach(t => {
        if (t.id === teamId) return;
        const otherSaved = selectedMarks[String(t.id)] || '';
        const otherBtns = document.querySelectorAll(`#sp-btns-${t.id} .sp-mark-btn`);
        otherBtns.forEach(btn => {
            const val = btn.dataset.val;
            btn.className = 'sp-mark-btn';
            if (val === '') {
                btn.classList.add('none-btn');
                if (!otherSaved) btn.classList.add('active-none');
            } else {
                if (otherSaved === val) btn.classList.add('active-' + val);
            }
        });
    });
}

function addCell(col, cls, text) {
    const w = document.createElement('div'); w.className = cls;
    const c = document.createElement('div'); c.className = 'cell'; c.textContent = text;
    w.appendChild(c); col.appendChild(w);
}

function onMarkChange(teamId, val) {
    if (val && UNIQUE_MARKS.includes(val)) {
        Object.keys(selectedMarks).forEach(id => {
            if (String(id) !== String(teamId) && selectedMarks[id] === val) {
                selectedMarks[id] = '';
                const sel = document.getElementById(`mark-${id}`);
                if (sel) { sel.value = ''; updateSelectStyle(sel, ''); }
            }
        });
    }
    selectedMarks[String(teamId)] = val;
    const sel = document.getElementById(`mark-${teamId}`);
    if (sel) { sel.value = val; updateSelectStyle(sel, val); }
    saveMarks();
    updateFormationPreview();
    drawCanvas();
}

function updateSelectStyle(sel, val) {
    sel.className = 'mark-select';
    if (val) sel.classList.add(`sel-${val}`);
}

function saveMarks() {
    localStorage.setItem(MY_MARKS_KEY, JSON.stringify(selectedMarks));
    const st = document.getElementById('save-status');
    if (st) { st.style.display = 'inline'; setTimeout(() => { st.style.display = 'none'; }, 2000); }
}

function resetMarks() {
    if (!confirm('印をすべてリセットします。よろしいですか？')) return;
    selectedMarks = {};
    localStorage.setItem(MY_MARKS_KEY, JSON.stringify(selectedMarks));
    teamsData.forEach(t => {
        const s = document.getElementById(`mark-${t.id}`);
        if (s) { s.value = ''; updateSelectStyle(s, ''); }
    });
    renderSPList();
    updateFormationPreview();
    drawCanvas();
}

/* ── フォーメーション ── */
const MARK_GROUP = {
    honmei:['honmei'], honmei_taikou:['honmei','taikou'],
    honmei_taikou_tanana:['honmei','taikou','tanana'],
    taikou:['taikou'], taikou_tanana:['taikou','tanana'],
    taikou_tanana_renka:['taikou','tanana','renka'],
    taikou_tanana_renka_osae:['taikou','tanana','renka','osae'],
    tanana:['tanana'], tanana_renka:['tanana','renka'],
    tanana_renka_osae:['tanana','renka','osae'],
    all_marked:['honmei','taikou','tanana','renka','osae'],
};

function getTeamsByMarkGroup(gk) {
    if (gk === 'all_marked') return teamsData.map(t => t.id).sort((a,b) => a-b);
    return Object.entries(selectedMarks)
        .filter(([,v]) => (MARK_GROUP[gk]||[]).includes(v))
        .map(([id]) => parseInt(id)).sort((a,b) => a-b);
}

function updateFormationPreview() {
    const type = document.getElementById('f-type').value;
    const is3 = (type === 'trio' || type === 'trifecta');
    document.getElementById('f-row2-wrap').style.display = is3 ? '' : 'none';
    const r0 = getTeamsByMarkGroup(document.getElementById('f-row0').value);
    const r1 = getTeamsByMarkGroup(document.getElementById('f-row1').value);
    const r2 = getTeamsByMarkGroup(document.getElementById('f-row2').value);
    const prev = document.getElementById('f-preview');
    if (!r0.length && !r1.length) { prev.textContent = '印を付けるとプレビューが表示されます'; return; }
    let txt = `1列目: [${r0.join(',') || 'なし'}]　2列目: [${r1.join(',') || 'なし'}]`;
    if (is3) txt += `　3列目: [${r2.join(',') || 'なし'}]`;
    prev.textContent = txt;
}

function goToOddsWithFormation() {
    const type = document.getElementById('f-type').value;
    const r0 = getTeamsByMarkGroup(document.getElementById('f-row0').value);
    const r1 = getTeamsByMarkGroup(document.getElementById('f-row1').value);
    const r2 = getTeamsByMarkGroup(document.getElementById('f-row2').value);
    if (!r0.length) { alert('1列目に該当するチームがありません。先に印を付けてください。'); return; }
    const p = new URLSearchParams({ tab: type, mode: 'formation', r0: r0.join(','), r1: r1.join(','), r2: r2.join(',') });
    p.append('apply', '1');
    window.location.href = `odds.html?${p.toString()}`;
}

/* ── Canvas ── */
async function preloadLogos() {
    await Promise.all(teamsData.map(team => new Promise(resolve => {
        const img = new Image(); img.crossOrigin = 'anonymous';
        img.onload = () => { logoCache[team.id] = img; resolve(); };
        img.onerror = () => resolve();
        img.src = team.logo;
    })));
}

function switchImageMode(mode, btn) {
    imageMode = mode;
    document.querySelectorAll('.image-mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    drawCanvas();
}

function drawCanvas() {
    if (imageMode === 'honmei') drawHonmeiCanvas();
    else drawAllMarksCanvas();
    updateTweetText();
}

function drawHonmeiCanvas() {
    const canvas = document.getElementById('preview-canvas');
    const ctx = canvas.getContext('2d');
    const hEntry = Object.entries(selectedMarks).find(([,v]) => v === 'honmei');
    const noMsg = document.getElementById('no-honmei-msg');
    if (!hEntry) { noMsg.style.display = ''; canvas.style.display = 'none'; return; }
    noMsg.style.display = 'none'; canvas.style.display = 'block';
    const honmeiId = parseInt(hEntry[0]);
    const team = teamsData.find(t => t.id === honmeiId);
    const frame = FRAME_COLORS[honmeiId] || { bg: '#003399', text: '#fff' };
    const W = 1120, H = 630; canvas.width = W; canvas.height = H;
    ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, W, H);
    ctx.strokeStyle = '#222'; ctx.lineWidth = 4; ctx.strokeRect(2, 2, W-4, H-4);
    ctx.strokeStyle = '#ddd'; ctx.lineWidth = 2; ctx.strokeRect(14, 14, W-28, H-28);
    const BAND_H = 56;
    ctx.fillStyle = '#003399'; ctx.fillRect(2, 2, W-4, BAND_H);
    ctx.save();
    ctx.font = 'bold 26px "Helvetica Neue",Arial,sans-serif';
    ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('Premier Series 26-27 予想企画', W/2, 2+BAND_H/2);
    ctx.restore();
    const CY = (BAND_H + H) / 2 + 10;
    const MARK_X = 56, FRAME_X = 160, FRAME_W = 112, FRAME_H = 112, LOGO_X = 296, LOGO_S = 160, NAME_X = 484;
    ctx.save();
    ctx.font = 'bold 120px serif'; ctx.fillStyle = '#cc0000';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('◎', MARK_X+36, CY);
    ctx.restore();
    const by = CY - FRAME_H/2;
    ctx.fillStyle = frame.bg; ctx.fillRect(FRAME_X, by, FRAME_W, FRAME_H);
    ctx.strokeStyle = frame.bg === '#f0f0f0' ? '#bbb' : 'rgba(0,0,0,.15)';
    ctx.lineWidth = 2; ctx.strokeRect(FRAME_X, by, FRAME_W, FRAME_H);
    ctx.save();
    ctx.font = 'bold 76px "Arial Black",Arial,sans-serif';
    ctx.fillStyle = frame.text; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(String(honmeiId), FRAME_X + FRAME_W/2, CY);
    ctx.restore();
    const ly = CY - LOGO_S/2;
    if (logoCache[honmeiId]) { ctx.drawImage(logoCache[honmeiId], LOGO_X, ly, LOGO_S, LOGO_S); }
    const name = team ? (team.name || team.tag) : `チーム${honmeiId}`;
    ctx.save();
    let fs = 56;
    ctx.font = `bold ${fs}px "Helvetica Neue",Arial,sans-serif`;
    while (ctx.measureText(name).width > W - NAME_X - 32 && fs > 24) { fs -= 2; ctx.font = `bold ${fs}px "Helvetica Neue",Arial,sans-serif`; }
    ctx.fillStyle = '#111'; ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
    ctx.fillText(name, NAME_X, CY);
    ctx.restore();
}

function drawAllMarksCanvas() {
    const canvas = document.getElementById('preview-canvas');
    const ctx = canvas.getContext('2d');
    const noMsg = document.getElementById('no-honmei-msg');
    const entries = [];
    MARK_ORDER.forEach(mk => {
        Object.entries(selectedMarks)
            .filter(([,v]) => v === mk)
            .sort(([a],[b]) => parseInt(a)-parseInt(b))
            .forEach(([tid]) => entries.push({ mk, tid: parseInt(tid) }));
    });
    if (!entries.length) { noMsg.style.display = ''; canvas.style.display = 'none'; return; }
    noMsg.style.display = 'none'; canvas.style.display = 'block';
    const W = 1120, H = 630; canvas.width = W; canvas.height = H;
    const BAND_H = 56, FOOTER_H = 44;
    const CONTENT_H = H - BAND_H - FOOTER_H;
    const ROW_H = Math.floor(CONTENT_H / Math.max(entries.length, 1));
    ctx.fillStyle = '#fff'; ctx.fillRect(0, 0, W, H);
    ctx.strokeStyle = '#222'; ctx.lineWidth = 4; ctx.strokeRect(2, 2, W-4, H-4);
    ctx.strokeStyle = '#ddd'; ctx.lineWidth = 2; ctx.strokeRect(14, 14, W-28, H-28);
    ctx.fillStyle = '#003399'; ctx.fillRect(2, 2, W-4, BAND_H);
    ctx.save();
    ctx.font = 'bold 26px "Helvetica Neue",Arial,sans-serif';
    ctx.fillStyle = '#fff'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('Premier Series 26-27 予想企画', W/2, 2+BAND_H/2);
    ctx.restore();
    entries.forEach(({ mk, tid }, i) => {
        const team = teamsData.find(t => t.id === tid);
        const frame = FRAME_COLORS[tid] || { bg: '#003399', text: '#fff' };
        const y = BAND_H + i * ROW_H;
        const midY = y + ROW_H/2;
        if (i % 2 === 0) { ctx.fillStyle = '#f8f8f8'; ctx.fillRect(18, y+2, W-36, ROW_H-4); }
        const markFs = Math.min(44, ROW_H * 0.55);
        ctx.save();
        ctx.font = `bold ${markFs}px serif`; ctx.fillStyle = '#333';
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(MARK_LABELS[mk], 60, midY);
        ctx.restore();
        const bside = Math.min(48, ROW_H * 0.6);
        const bx = 96, bby = midY - bside/2;
        ctx.fillStyle = frame.bg; ctx.fillRect(bx, bby, bside, bside);
        ctx.strokeStyle = frame.bg === '#f0f0f0' ? '#bbb' : 'rgba(0,0,0,.1)';
        ctx.lineWidth = 1; ctx.strokeRect(bx, bby, bside, bside);
        ctx.save();
        ctx.font = `bold ${Math.floor(bside*0.6)}px Arial,sans-serif`; ctx.fillStyle = frame.text;
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillText(String(tid), bx + bside/2, midY);
        ctx.restore();
        const ls = Math.min(56, ROW_H * 0.7);
        if (logoCache[tid]) { ctx.drawImage(logoCache[tid], 154, midY-ls/2, ls, ls); }
        const name = team ? (team.name || team.tag) : `チーム${tid}`;
        ctx.save();
        let fs = Math.min(30, ROW_H * 0.38);
        ctx.font = `bold ${fs}px "Helvetica Neue",Arial,sans-serif`;
        while (ctx.measureText(name).width > W - 248 && fs > 16) { fs--; ctx.font = `bold ${fs}px "Helvetica Neue",Arial,sans-serif`; }
        ctx.fillStyle = '#111'; ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
        ctx.fillText(name, 222, midY);
        ctx.restore();
        if (i < entries.length - 1) {
            ctx.strokeStyle = '#eee'; ctx.lineWidth = 1;
            ctx.beginPath(); ctx.moveTo(28, y + ROW_H); ctx.lineTo(W-28, y + ROW_H); ctx.stroke();
        }
    });
}

function updateTweetText() {
    const parts = [];
    MARK_ORDER.forEach(mk => {
        Object.entries(selectedMarks)
            .filter(([,v]) => v === mk)
            .sort(([a],[b]) => parseInt(a)-parseInt(b))
            .forEach(([tid]) => {
                const t = teamsData.find(t => String(t.id) === String(tid));
                if (t) parts.push(`${MARK_LABELS[mk]}${t.tag}`);
            });
    });
    const marksLine = parts.join(' ');
    document.getElementById('tweet-text').value = marksLine || '';
}

function saveImage() {
    const c = document.getElementById('preview-canvas');
    const a = document.createElement('a'); a.download = 'shadowverse_ps_yoso.png'; a.href = c.toDataURL('image/png'); a.click();
}

function doTweet() {
    const text = document.getElementById('tweet-text').value;
    window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}`, '_blank');
}
